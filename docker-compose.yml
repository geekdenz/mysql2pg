services:
  middleware:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      MW_SERVER_BIND_ADDR: ${MW_SERVER_BIND_ADDR:-0.0.0.0:8080}
      MW_MYSQL_BIND_ADDR: ${MW_MYSQL_BIND_ADDR:-0.0.0.0:3306}
      MW_POSTGRES_DRIVER: ${MW_POSTGRES_DRIVER:-tokio-postgres}
      MW_POSTGRES_CONNECTION_STRING: ${MW_POSTGRES_CONNECTION_STRING:-host=postgres port=5432 user=postgres password=postgres dbname=app}
      MW_TRANSLATOR_REWRITE_LIMIT_COMMA: ${MW_TRANSLATOR_REWRITE_LIMIT_COMMA:-true}
      MW_TRANSLATOR_NORMALIZE_MYSQL_BACKTICKS: ${MW_TRANSLATOR_NORMALIZE_MYSQL_BACKTICKS:-true}
      MW_TRANSLATOR_NORMALIZE_BOOLEAN_LITERALS: ${MW_TRANSLATOR_NORMALIZE_BOOLEAN_LITERALS:-true}
      MW_TRANSLATOR_REWRITE_MYSQL_FUNCTIONS: ${MW_TRANSLATOR_REWRITE_MYSQL_FUNCTIONS:-true}
      MW_TRANSLATOR_REWRITE_JSON_OPERATORS: ${MW_TRANSLATOR_REWRITE_JSON_OPERATORS:-true}
      MW_TRANSLATOR_STRIP_MYSQL_TABLE_OPTIONS: ${MW_TRANSLATOR_STRIP_MYSQL_TABLE_OPTIONS:-true}
      RUST_LOG: ${RUST_LOG:-info}
    ports:
      - "${MIDDLEWARE_PORT:-8080}:8080"
      - "${MYSQL_FRONTEND_PORT:-3306}:3306"
    depends_on:
      postgres:
        condition: service_healthy
    command: ["mysql2pg-middleware", "--config", "/app/config/example.toml", "serve"]

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  matomo:
    image: matomo:${MATOMO_IMAGE_TAG:-5.8.0-apache}
    profiles: ["matomo"]
    environment:
      MATOMO_DATABASE_HOST: ${MATOMO_DATABASE_HOST:-middleware}
      MATOMO_DATABASE_ADAPTER: ${MATOMO_DATABASE_ADAPTER:-MYSQLI}
      MATOMO_DATABASE_TABLES_PREFIX: ${MATOMO_DATABASE_TABLES_PREFIX:-matomo_}
      MATOMO_DATABASE_USERNAME: ${MATOMO_DATABASE_USERNAME:-anyuser}
      MATOMO_DATABASE_PASSWORD: ${MATOMO_DATABASE_PASSWORD:-matomo}
      MATOMO_DATABASE_DBNAME: ${MATOMO_DATABASE_DBNAME:-app}
      PHP_MEMORY_LIMIT: ${MATOMO_PHP_MEMORY_LIMIT:-512M}
    ports:
      - "${MATOMO_PORT:-8081}:80"
    depends_on:
      middleware:
        condition: service_started
    volumes:
      - matomo_data:/var/www/html

volumes:
  postgres_data:
  matomo_data:
